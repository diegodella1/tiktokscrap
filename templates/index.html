<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ──────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        :root {
            --bg-base: #08090d;
            --bg-raised: #10121a;
            --bg-surface: #161824;
            --border: #1c1f2e;
            --border-hover: #2a2d40;
            --text-primary: #e0e4ec;
            --text-secondary: #9ca0b2;
            --text-muted: #6b6f82;
            --text-faint: #3a3d4c;
            --accent: #ff3b5c;
            --accent-hover: #e63350;
            --accent-muted: rgba(255, 59, 92, 0.12);
            --green: #22c55e;
            --green-muted: rgba(34,197,94,0.12);
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 10px;
        }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        ::selection { background: var(--accent-muted); color: #fff; }

        /* ── Top Bar ────────────────────────────────────── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(8,9,13,0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            height: 44px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 1.5rem; }
        .topbar-brand {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
            color: var(--text-primary); text-transform: uppercase;
        }
        .topbar-brand .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
        }
        .topbar-metrics { display: flex; gap: 1.2rem; }
        .metric {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.7rem; color: var(--text-muted);
        }
        .metric .mv { color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.68rem; }
        .metric .mv--live { color: var(--green); }
        .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--text-faint); display: inline-block;
        }
        .status-dot--ok { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.3); }
        .status-dot--scanning { background: var(--accent); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,59,92,0.3); }
            50% { opacity: 0.5; box-shadow: 0 0 0 8px rgba(255,59,92,0); }
        }

        /* ── Buttons ────────────────────────────────────── */
        .btn {
            padding: 0.35rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-raised);
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 0.75rem; font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            text-decoration: none;
        }
        .btn:hover { border-color: var(--border-hover); color: var(--text-primary); text-decoration: none; }
        .btn-primary {
            background: var(--accent); border-color: var(--accent);
            color: #fff; font-weight: 600;
        }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-sm { padding: 0.25rem 0.55rem; font-size: 0.7rem; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        /* ── Layout ─────────────────────────────────────── */
        .page { max-width: 920px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

        /* ── Control Strip ──────────────────────────────── */
        .control-strip {
            display: flex; align-items: center; gap: 0.8rem;
            background: var(--bg-raised); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 0.6rem 1rem;
            margin-bottom: 1.5rem;
        }
        .cs-label {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--text-muted); margin-right: auto;
        }
        .auto-pill {
            display: inline-flex; align-items: center; gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px; font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.3px;
            background: var(--bg-surface); border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer; user-select: none;
            transition: all 0.2s;
        }
        .auto-pill.on {
            background: var(--green-muted); border-color: rgba(34,197,94,0.25);
            color: var(--green);
        }
        .auto-pill.off {
            background: rgba(255,59,92,0.08); border-color: rgba(255,59,92,0.2);
            color: #f87171;
        }
        .auto-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-faint);
        }
        .auto-pill.on .auto-dot { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
        .auto-pill.off .auto-dot { background: #f87171; }
        .interval-input {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.72rem; color: var(--text-muted);
        }
        .interval-input input {
            width: 3.2rem; padding: 0.2rem 0.3rem;
            background: var(--bg-base); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-family: var(--font-mono); font-size: 0.72rem; text-align: center;
            transition: border-color 0.15s;
        }
        .interval-input input:focus { outline: none; border-color: var(--accent); }
        .scan-wrap { display: flex; align-items: center; gap: 0.5rem; }
        .scan-dot {
            width: 6px; height: 6px; border-radius: 50%;
            display: none;
        }
        .scan-dot.active { display: block; background: var(--accent); animation: pulse 1s infinite; }

        /* ── Section ────────────────────────────────────── */
        .section { margin-bottom: 1.5rem; }
        .section-head {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.6rem;
        }
        .section-label {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--text-muted);
        }
        .section-badge {
            font-size: 0.62rem; font-family: var(--font-mono);
            color: var(--text-faint); background: var(--bg-surface);
            padding: 0.1rem 0.4rem; border-radius: var(--radius-sm);
        }

        /* ── Accounts ───────────────────────────────────── */
        .add-row { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
        .add-row input {
            flex: 1; padding: 0.4rem 0.7rem;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); color: var(--text-primary);
            font-family: var(--font-body); font-size: 0.82rem;
            transition: border-color 0.15s;
        }
        .add-row input:focus { outline: none; border-color: var(--accent); }
        .add-row input::placeholder { color: var(--text-faint); }
        .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .chip {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.55rem; min-height: 44px;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); font-size: 0.75rem;
            transition: border-color 0.15s;
        }
        .chip:hover { border-color: var(--border-hover); }
        .chip-user { color: var(--text-primary); font-weight: 500; }
        .chip-n {
            font-family: var(--font-mono); font-size: 0.62rem;
            color: var(--text-muted); background: var(--bg-base);
            padding: 0.05rem 0.3rem; border-radius: 3px;
        }
        .chip-x {
            color: var(--text-faint); cursor: pointer;
            font-size: 0.9rem; line-height: 1;
            transition: color 0.15s;
            background: none; border: none; padding: 0;
            font-family: inherit;
        }
        .chip-x:hover { color: var(--accent); }

        /* ── Avatars ───────────────────────────────────── */
        .avatar {
            width: 20px; height: 20px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0;
        }
        .avatar--card { width: 24px; height: 24px; }
        .avatar-fallback {
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%; flex-shrink: 0;
            background: var(--bg-base); border: 1px solid var(--border);
            color: var(--text-muted); font-weight: 600;
            font-size: 0.58rem; text-transform: uppercase;
        }
        .avatar-fallback--chip { width: 20px; height: 20px; }
        .avatar-fallback--card { width: 24px; height: 24px; font-size: 0.65rem; }
        .avatar-fallback--ftag { width: 16px; height: 16px; font-size: 0.5rem; }
        .avatar--ftag { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

        /* ── Stats Row ─────────────────────────────────── */
        .t-stats {
            display: flex; gap: 1rem; flex-wrap: wrap;
            font-family: var(--font-mono); font-size: 0.72rem;
            color: var(--text-muted); margin-bottom: 0.6rem;
        }
        .t-stat { display: inline-flex; align-items: center; gap: 0.3rem; }
        .t-stat-icon { display: inline-flex; align-items: center; }
        .t-stat-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .empty-msg {
            color: var(--text-faint); font-size: 0.78rem;
            text-align: center; padding: 0.8rem;
            border: 1px dashed var(--border); border-radius: var(--radius-md);
        }

        /* ── Filters ────────────────────────────────────── */
        .filters { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
        .ftag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.25rem 0.55rem; min-height: 44px;
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted); font-size: 0.7rem; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
        }
        .ftag:hover { border-color: var(--border-hover); color: var(--text-secondary); }
        .ftag.on {
            border-color: var(--accent); color: var(--accent);
            background: var(--accent-muted);
        }
        .ftag-n {
            font-family: var(--font-mono); font-size: 0.58rem;
            padding: 0.05rem 0.25rem; border-radius: 3px;
            background: rgba(255,255,255,0.04); color: var(--text-faint);
        }
        .ftag.on .ftag-n { background: rgba(255,59,92,0.15); color: var(--accent); }

        /* ── Timeline ───────────────────────────────────── */
        .timeline { display: flex; flex-direction: column; gap: 1px; }
        .t-card {
            background: var(--bg-raised); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 1rem 1.1rem;
            transition: border-color 0.15s;
            animation: fadeUp 0.2s ease-out;
            display: flex; gap: 1rem;
        }
        .t-card:hover { border-color: var(--border-hover); }
        .t-card-body { flex: 1; min-width: 0; }
        .t-thumb {
            width: 100px; aspect-ratio: 100/130; object-fit: cover;
            border-radius: var(--radius-md); flex-shrink: 0;
            background: var(--bg-surface);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* card top row */
        .t-row1 {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 0.6rem;
            margin-bottom: 0.5rem;
        }
        .t-user {
            display: inline-flex; align-items: center; gap: 0.35rem;
            font-size: 0.78rem; font-weight: 600; color: var(--accent);
            background: var(--accent-muted);
            padding: 0.15rem 0.5rem; border-radius: var(--radius-sm);
            flex-shrink: 0;
        }

        .t-date {
            font-family: var(--font-mono); font-size: 0.68rem;
            color: var(--text-muted); flex-shrink: 0;
        }

        /* description */
        .t-desc {
            font-size: 0.82rem; line-height: 1.75; color: var(--text-secondary);
            word-break: break-word; white-space: pre-wrap;
            margin-bottom: 0.6rem; max-width: 65ch;
        }

        /* footer */
        .t-foot { display: flex; justify-content: flex-end; }
        .t-link {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-muted); font-size: 0.68rem; font-weight: 500;
            transition: all 0.15s; text-decoration: none;
        }
        .t-link:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

        /* ── Empty ──────────────────────────────────────── */
        .empty-feed {
            text-align: center; padding: 3rem 1rem;
            border: 1px dashed var(--border); border-radius: var(--radius-lg);
            color: var(--text-faint);
        }
        .empty-feed strong { display: block; color: var(--text-muted); margin-bottom: 0.3rem; font-size: 0.88rem; }
        .empty-feed span { font-size: 0.72rem; }

        /* ── Load more ──────────────────────────────────── */
        .more-wrap { text-align: center; margin-top: 1rem; }

        /* ── Tabs ──────────────────────────────────────── */
        .tabs {
            display: flex; gap: 0;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            padding: 0.6rem 1.2rem;
            background: none; border: none; border-bottom: 2px solid transparent;
            color: var(--text-muted); font-family: var(--font-body);
            font-size: 0.78rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
        }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }


        /* ── Skeleton Loading ───────────────────────────── */
        .skeleton {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem 1.1rem;
            display: flex; gap: 1rem;
        }
        .skeleton-body { flex: 1; display: flex; flex-direction: column; gap: 0.6rem; }
        .skeleton-line {
            height: 0.75rem; border-radius: var(--radius-sm);
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--border) 50%, var(--bg-surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-line--short { width: 40%; }
        .skeleton-line--medium { width: 70%; }
        .skeleton-line--long { width: 95%; }
        .skeleton-thumb {
            width: 100px; aspect-ratio: 100/130;
            border-radius: var(--radius-md); flex-shrink: 0;
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--border) 50%, var(--bg-surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .skeleton-chips { display: flex; gap: 0.35rem; flex-wrap: wrap; }
        .skeleton-chip {
            width: 100px; height: 44px; border-radius: var(--radius-md);
            background: linear-gradient(90deg, var(--bg-surface) 25%, var(--border) 50%, var(--bg-surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Toast ─────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: var(--bg-surface); border: 1px solid var(--green);
            color: var(--green); padding: 0.5rem 1.2rem;
            border-radius: var(--radius-lg); font-size: 0.78rem; font-weight: 500;
            z-index: 200; opacity: 0; transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ── Scan Spinner ──────────────────────────────── */
        .btn-spinner {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 0.35rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Empty State Icon ──────────────────────────── */
        .empty-icon { margin-bottom: 0.8rem; }
        .empty-icon svg { width: 48px; height: 48px; stroke: var(--text-faint); fill: none; stroke-width: 1.5; }

        /* ── Responsive ─────────────────────────────────── */
        @media (max-width: 640px) {
            .topbar { padding: 0 1rem; overflow-x: auto; }
            .topbar-metrics { display: none; }
            .page { padding: 1rem 1rem 3rem; }
            .control-strip { flex-wrap: wrap; }
            .cs-label { width: 100%; margin-bottom: 0.2rem; }
            .t-row1 { flex-direction: column; gap: 0.3rem; }
            .add-row { flex-direction: column; }
            .t-thumb { width: 72px; aspect-ratio: 100/130; }
            .t-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem 1rem; }
        }

        /* ── Reduced Motion ────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            html { scroll-behavior: auto; }
        }
    </style>
</head>
<body>
    <!-- ── Top Bar ──────────────────────────────────── -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-brand">
                <span class="dot"></span> TikTok Monitor
            </div>
            <div class="topbar-metrics">
                <span class="metric">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="mv" id="statusLastScan">--</span>
                </span>
                <span class="metric">
                    <span>Cuentas:</span>
                    <span class="mv mv--live" id="statusAccounts">0</span>
                </span>
                <span class="metric">
                    <span>Posts:</span>
                    <span class="mv mv--live" id="statusPosts">0</span>
                </span>
            </div>
        </div>
        <div class="topbar-right">
            <a href="/docs" class="btn btn-sm">Docs</a>
            <a href="/logout" class="btn btn-sm">Salir</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="page">
        <div class="control-strip">
                <span class="cs-label">Scanner TikTok</span>
                <span class="auto-pill" id="autoPill" onclick="toggleAuto()" title="Click para activar/desactivar">
                    <span class="auto-dot" id="autoDot"></span>
                    <span id="autoLabel">--</span>
                </span>
                <div class="interval-input">
                    <span>cada</span>
                    <input type="number" id="intervalInput" min="1" max="1440" value="30" onchange="setInterval_()">
                    <span>min</span>
                </div>
                <div class="scan-wrap">
                    <span class="scan-dot" id="scanIndicator"></span>
                    <button class="btn" id="refreshBtn" onclick="doRefresh()" title="Recargar datos de la DB">&#8635; Refrescar</button>
                    <button class="btn btn-primary" id="scanBtn" onclick="doScan()" aria-label="Escanear cuentas de TikTok ahora">Escanear ahora</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('timeline', this)">Timeline</button>
                <button class="tab-btn" onclick="switchTab('cuentas', this)">Cuentas <span class="section-badge" id="accountCountBadge">0</span></button>
            </div>

            <div class="tab-panel active" id="panelTimeline">
                <div class="section">
                    <div class="section-head">
                        <span class="section-label">Timeline</span>
                        <span class="section-badge" id="postsShownBadge">0</span>
                    </div>
                    <div class="filters" id="filterBar">
                        <span class="ftag on" data-user="" onclick="filterPosts(this,'')">Todos</span>
                    </div>
                    <div class="timeline" id="postsFeed">
                        <div class="empty-feed">
                            <div class="empty-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                            <strong>Sin posts todavia</strong>
                            <span>Agrega cuentas y ejecuta un scan.</span>
                        </div>
                    </div>
                    <div class="more-wrap">
                        <button class="btn btn-sm" id="loadMoreBtn" onclick="loadMore()" style="display:none;">Cargar mas</button>
                    </div>
                </div>
            </div>

            <div class="tab-panel" id="panelCuentas">
                <div class="section">
                    <div class="section-head">
                        <span class="section-label">Cuentas monitoreadas</span>
                    </div>
                    <div class="add-row">
                        <input type="text" id="usernameInput" placeholder="@username" onkeydown="if(event.key==='Enter')addAccount()">
                        <button class="btn" onclick="addAccount()">Agregar</button>
                    </div>
                    <div class="chips" id="accountList">
                        <div class="empty-msg"><svg class="empty-icon" style="width:24px;height:24px;vertical-align:middle;margin-right:0.3rem;stroke:var(--text-faint);fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Sin cuentas. Agrega una para empezar.</div>
                    </div>
                </div>
            </div>
    </div>

    <script>
        // ══════════════════════════════════════════════════
        // TABS
        // ══════════════════════════════════════════════════
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function(t) { t.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById(tab === 'cuentas' ? 'panelCuentas' : 'panelTimeline').classList.add('active');
        }

        // ══════════════════════════════════════════════════
        // HELPERS
        // ══════════════════════════════════════════════════
        async function api(path, opts) {
            opts = opts || {};
            var res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
            if (res.status === 401) { window.location = '/login'; return null; }
            return res.json();
        }

        function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function fmtCompact(n) {
            if (n == null) return '--';
            if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return String(n);
        }

        function formatDate(s) {
            if (!s) return '';
            var d = s.includes('T') ? new Date(s) : new Date(s + 'Z');
            if (isNaN(d.getTime())) return '';
            return d.toLocaleString('es-AR', {
                timeZone: 'America/Argentina/Buenos_Aires',
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit', hour12: false
            });
        }

        function timeAgo(s) {
            if (!s) return '';
            var d = s.includes('T') ? new Date(s) : new Date(s + 'Z');
            if (isNaN(d.getTime())) return '';
            var diff = Math.floor((Date.now() - d.getTime()) / 1000);
            if (diff < 60) return 'ahora';
            if (diff < 3600) return 'hace ' + Math.floor(diff / 60) + 'm';
            if (diff < 86400) return 'hace ' + Math.floor(diff / 3600) + 'h';
            return 'hace ' + Math.floor(diff / 86400) + 'd';
        }

        function avatarFallbackHtml(username, sz) {
            var initial = username ? username.charAt(0).toUpperCase() : '?';
            return '<span class="avatar-fallback avatar-fallback--' + sz + '">' + initial + '</span>';
        }

        function makeAvatarHtml(username, cls, avatarMap) {
            var url = avatarMap[username];
            var sz = cls || 'chip';
            if (url) {
                var safeUser = escapeHtml(username).replace(/'/g, "\\'");
                return '<img class="avatar avatar--' + sz + '" src="' + escapeHtml(url) + '" alt="" onerror="this.outerHTML=avatarFallbackHtml(\'' + safeUser + '\',\'' + sz + '\')">';
            }
            return avatarFallbackHtml(username, sz);
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2500);
        }

        function skeletonCards(n) {
            var html = '';
            for (var i = 0; i < n; i++) {
                html += '<div class="skeleton"><div class="skeleton-body">' +
                    '<div class="skeleton-line skeleton-line--short"></div>' +
                    '<div class="skeleton-line skeleton-line--long"></div>' +
                    '<div class="skeleton-line skeleton-line--medium"></div>' +
                '</div><div class="skeleton-thumb"></div></div>';
            }
            return html;
        }

        function skeletonChips(n) {
            var html = '';
            for (var i = 0; i < n; i++) html += '<div class="skeleton-chip"></div>';
            return '<div class="skeleton-chips">' + html + '</div>';
        }

        const PAGE_SIZE = 50;

        // ══════════════════════════════════════════════════
        // TIKTOK
        // ══════════════════════════════════════════════════
        var currentFilter = new Set();
        var currentOffset = 0;
        var isScanning = false;
        var accountPostCounts = {};
        var accountAvatars = {};
        var totalPostsInDB = 0;
        var postsShown = 0;
        var _accountUsernames = [];

        function avatarHtml(username, cls) { return makeAvatarHtml(username, cls, accountAvatars); }

        async function loadStatus() {
            var data = await api('/api/status');
            if (!data) return;
            var lastEl = document.getElementById('statusLastScan');
            var dotEl = document.getElementById('statusDot');
            // If a scan is running (started by anyone), show progress
            var p = data.scan_progress;
            if (p && p.running) {
                _showScanProgress(p);
                _startScanPolling();
            } else if (isScanning && !_scanPollTimer) {
                // Scan just finished between polls
                _resetScanUI();
            }
            if (data.last_scan) {
                lastEl.textContent = timeAgo(data.last_scan.finished_at) + ' (' + data.last_scan.new_posts + ' nuevos)';
                if (!isScanning) dotEl.className = 'status-dot status-dot--ok';
            } else {
                lastEl.textContent = 'nunca';
                if (!isScanning) dotEl.className = 'status-dot';
            }
            document.getElementById('intervalInput').value = data.interval_minutes;
            var pill = document.getElementById('autoPill');
            var label = document.getElementById('autoLabel');
            if (data.auto_scan) {
                pill.className = 'auto-pill on';
                label.textContent = 'Auto ON';
            } else {
                pill.className = 'auto-pill off';
                label.textContent = 'Auto OFF';
            }
        }

        async function setInterval_() {
            var mins = parseInt(document.getElementById('intervalInput').value, 10);
            if (!mins || mins < 1 || mins > 1440) return;
            await api('/api/interval', { method: 'POST', body: JSON.stringify({ minutes: mins }) });
            loadStatus();
        }

        async function loadAccounts() {
            document.getElementById('accountList').innerHTML = skeletonChips(3);
            var accounts = await api('/api/accounts');
            if (!accounts) return;
            accountAvatars = {};
            _accountUsernames = [];
            accounts.forEach(function(a) {
                _accountUsernames.push(a.username);
                if (a.avatar_url) accountAvatars[a.username] = a.avatar_url;
            });
            document.getElementById('statusAccounts').textContent = _accountUsernames.length;
            document.getElementById('accountCountBadge').textContent = _accountUsernames.length;
            renderChips();
            updateFilterBar(_accountUsernames);
            fetchPostCounts(_accountUsernames);
        }

        function renderChips() {
            var list = document.getElementById('accountList');
            if (_accountUsernames.length === 0) {
                list.innerHTML = '<div class="empty-msg"><svg style="width:24px;height:24px;vertical-align:middle;margin-right:0.3rem;stroke:var(--text-faint);fill:none;stroke-width:1.5" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Sin cuentas. Agrega una para empezar.</div>';
                return;
            }
            list.innerHTML = _accountUsernames.map(function(u) {
                var c = accountPostCounts[u] !== undefined ? accountPostCounts[u] : '-';
                return '<span class="chip">' + avatarHtml(u, 'chip') +
                    '<span class="chip-user">@' + u + '</span>' +
                    '<span class="chip-n">' + c + '</span>' +
                    '<button class="chip-x" onclick="removeAccount(\'' + u + '\')" aria-label="Eliminar cuenta @' + u + '">&times;</button></span>';
            }).join('');
        }

        async function fetchPostCounts(accounts) {
            var data = await api('/api/posts/counts');
            if (!data) return;
            accountPostCounts = data.counts || {};
            totalPostsInDB = data.total || 0;
            accounts.forEach(function(u) {
                if (!(u in accountPostCounts)) accountPostCounts[u] = 0;
            });
            document.getElementById('statusPosts').textContent = totalPostsInDB;
            renderChips();
            updateFilterBadges();
        }

        function updateFilterBadges() {
            document.querySelectorAll('#filterBar .ftag').forEach(function(t) {
                var u = t.getAttribute('data-user');
                var b = t.querySelector('.ftag-n');
                if (!b) return;
                b.textContent = u === '' ? totalPostsInDB : (accountPostCounts[u] || 0);
            });
        }

        async function addAccount() {
            var input = document.getElementById('usernameInput');
            var u = input.value.trim();
            if (!u) return;
            await api('/api/accounts', { method: 'POST', body: JSON.stringify({ username: u }) });
            input.value = '';
            showToast('Cuenta @' + u + ' agregada');
            loadAccounts();
        }

        async function removeAccount(u) {
            if (!confirm('Eliminar @' + u + ' y todos sus posts?')) return;
            await api('/api/accounts/' + u, { method: 'DELETE' });
            loadAccounts();
            loadPosts();
        }

        function updateFilterBar(accounts) {
            var bar = document.getElementById('filterBar');
            var tb = totalPostsInDB || '-';
            bar.innerHTML = '<span class="ftag ' + (currentFilter.size === 0 ? 'on' : '') +
                '" data-user="" onclick="filterPosts(this,\'\')">Todos <span class="ftag-n">' + tb + '</span></span>';
            accounts.forEach(function(u) {
                var c = accountPostCounts[u] !== undefined ? accountPostCounts[u] : '-';
                bar.innerHTML += '<span class="ftag ' + (currentFilter.has(u) ? 'on' : '') +
                    '" data-user="' + u + '" onclick="filterPosts(this,\'' + u + '\')">' +
                    avatarHtml(u, 'ftag') + ' @' + u +
                    ' <span class="ftag-n">' + c + '</span></span>';
            });
        }

        function filterPosts(el, u) {
            if (u === '') {
                currentFilter.clear();
            } else if (currentFilter.has(u)) {
                currentFilter.delete(u);
            } else {
                currentFilter.add(u);
            }
            currentOffset = 0;
            document.querySelectorAll('#filterBar .ftag').forEach(function(t) {
                var du = t.getAttribute('data-user');
                if (du === '') t.classList.toggle('on', currentFilter.size === 0);
                else t.classList.toggle('on', currentFilter.has(du));
            });
            loadPosts();
        }

        var ICON_EYE = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        var ICON_HEART = '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
        var ICON_COMMENT = '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
        var ICON_REPOST = '<svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>';

        function statsHtml(p) {
            if (p.view_count == null && p.like_count == null && p.comment_count == null && p.repost_count == null) return '';
            return '<div class="t-stats">' +
                '<span class="t-stat" title="Views"><span class="t-stat-icon">' + ICON_EYE + '</span> ' + fmtCompact(p.view_count) + '</span>' +
                '<span class="t-stat" title="Likes"><span class="t-stat-icon">' + ICON_HEART + '</span> ' + fmtCompact(p.like_count) + '</span>' +
                '<span class="t-stat" title="Comments"><span class="t-stat-icon">' + ICON_COMMENT + '</span> ' + fmtCompact(p.comment_count) + '</span>' +
                '<span class="t-stat" title="Reposts"><span class="t-stat-icon">' + ICON_REPOST + '</span> ' + fmtCompact(p.repost_count) + '</span>' +
            '</div>';
        }

        async function loadPosts(append) {
            if (!append) document.getElementById('postsFeed').innerHTML = skeletonCards(3);
            var params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentOffset });
            currentFilter.forEach(function(u) { params.append('username', u); });
            var posts = await api('/api/posts?' + params);
            if (!posts) return;
            var feed = document.getElementById('postsFeed');
            var html = posts.map(function(p) {
                var ago = timeAgo(p.post_date || p.discovered_at);
                var fullDate = formatDate(p.post_date || p.discovered_at);
                var desc = p.description ? '<div class="t-desc">' + escapeHtml(p.description) + '</div>' : '';
                var thumb = p.thumbnail_url ? '<img class="t-thumb" src="' + escapeHtml(p.thumbnail_url) + '" alt="" loading="lazy">' : '';
                return '<div class="t-card">' +
                    '<div class="t-card-body">' +
                        '<div class="t-row1">' +
                            '<span class="t-user">' + avatarHtml(p.username, 'card') + ' @' + escapeHtml(p.username) + '</span>' +
                            '<span class="t-date" title="' + fullDate + '">' + ago + '</span>' +
                        '</div>' + desc + statsHtml(p) +
                        '<div class="t-foot">' +
                            '<a class="t-link" href="' + escapeHtml(p.url) + '" target="_blank" rel="noopener">Abrir en TikTok &#8599;</a>' +
                        '</div>' +
                    '</div>' + thumb +
                '</div>';
            }).join('');
            if (append) { feed.innerHTML += html; postsShown += posts.length; }
            else if (html) { feed.innerHTML = html; postsShown = posts.length; }
            else { feed.innerHTML = '<div class="empty-feed"><div class="empty-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><strong>Sin posts todavia</strong><span>Agrega cuentas y ejecuta un scan.</span></div>'; postsShown = 0; }
            document.getElementById('postsShownBadge').textContent = postsShown;
            document.getElementById('loadMoreBtn').style.display = posts.length >= PAGE_SIZE ? '' : 'none';
        }

        function loadMore() { currentOffset += PAGE_SIZE; loadPosts(true); }

        var _scanPollTimer = null;

        function _startScanPolling() {
            if (_scanPollTimer) return;
            _scanPollTimer = window.setInterval(async function() {
                var data = await api('/api/status');
                if (!data) return;
                var p = data.scan_progress;
                if (p && p.running) {
                    _showScanProgress(p);
                } else {
                    _stopScanPolling();
                    _resetScanUI();
                    loadPosts(); loadStatus(); loadAccounts();
                }
            }, 3000);
        }

        function _stopScanPolling() {
            if (_scanPollTimer) { clearInterval(_scanPollTimer); _scanPollTimer = null; }
        }

        function _showScanProgress(p) {
            var btn = document.getElementById('scanBtn');
            var ind = document.getElementById('scanIndicator');
            var dot = document.getElementById('statusDot');
            btn.disabled = true;
            btn.textContent = '@' + p.current_user + ' (' + p.current + '/' + p.total + ')';
            ind.classList.add('active');
            dot.className = 'status-dot status-dot--scanning';
            isScanning = true;
        }

        function _resetScanUI() {
            var btn = document.getElementById('scanBtn');
            var ind = document.getElementById('scanIndicator');
            btn.disabled = false; btn.textContent = 'Escanear ahora';
            ind.classList.remove('active'); isScanning = false;
        }

        async function doScan() {
            var btn = document.getElementById('scanBtn');
            var ind = document.getElementById('scanIndicator');
            var dot = document.getElementById('statusDot');
            btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span>Escaneando...';
            ind.classList.add('active'); dot.className = 'status-dot status-dot--scanning';
            isScanning = true;
            var result = await api('/api/scan', { method: 'POST' });
            if (result && result.message === 'Scan already running') {
                // Another scan is running — poll for progress
                if (result.progress) _showScanProgress(result.progress);
                _startScanPolling();
                return;
            }
            _resetScanUI();
            if (result) { loadPosts(); loadStatus(); loadAccounts(); }
        }

        async function doRefresh() {
            var btn = document.getElementById('refreshBtn');
            btn.disabled = true; btn.textContent = 'Cargando...';
            await Promise.all([loadAccounts(), loadPosts(), loadStatus()]);
            btn.disabled = false; btn.textContent = '\u21BB Refrescar';
        }

        async function toggleAuto() {
            var pill = document.getElementById('autoPill');
            var isOn = pill.classList.contains('on');
            await api('/api/autoscan', { method: 'POST', body: JSON.stringify({ enabled: !isOn }) });
            loadStatus();
        }

        // ══════════════════════════════════════════════════
        // INIT
        // ══════════════════════════════════════════════════
        loadStatus(); loadAccounts(); loadPosts();
        setInterval(function() { loadStatus(); }, 60000);
    </script>
</body>
</html>
